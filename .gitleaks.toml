# gitleaks configuration — allowlist for documentation false-positives
# All entries below are spec/config example values, not real secrets.

[allowlist]
description = "Documentation files with example IDs and test sentinel names"
paths = [
    # CONFIG-SCHEMA.md uses example Discord snowflakes as placeholder values.
    '''docs/CONFIG-SCHEMA\.md''',
    # SDD-12.md embeds test-function names that look like Discord IDs/secrets to gitleaks.
    '''docs/sdd/SDD-12\.md''',
]
