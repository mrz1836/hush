# openclaw — multi-provider LLM + external-services gateway daemon
#
# Schema reference: deploy/examples/supervisors/example-daemon.toml
# Full field docs:  docs/CONFIG-SCHEMA.md#supervisor-config
#
# Replace server_url and client_machine_index with values from your
# `hush init server` / `hush init client --machine-index N` output.

name                      = "openclaw"
reason                    = "OpenClaw gateway"
server_url                = "http://100.64.0.1:7743/h/example"
client_machine_index      = 1
session_type              = "supervisor"
requested_ttl             = "20h"
refresh_window            = "09:00-10:00"
cache_secrets_for_restart = true
cache_grace_ttl           = "60m"
status_socket             = "/tmp/hush/supervise-openclaw.sock"
pid_file                  = "/tmp/hush/supervise-openclaw.pid"

scope = [
  "ANTHROPIC_API_KEY",
  "OPENAI_API_KEY",
  "GEMINI_API_KEY",
  "OPENCLAW_ANTHROPIC_TOKEN",
  "OPENCLAW_MINI_AUTH_TOKEN",
  "ASANA_PAT",
  "NESTR_API_KEY",
  "ETHERSCAN_API_KEY",
  "GO_BROADCAST_AI_API_KEY",
]

[child]
command         = ["/usr/local/bin/openclaw", "gateway", "start"]
env_passthrough = ["PATH", "HOME", "SHELL"]

[validators]
ANTHROPIC_API_KEY        = "anthropic"
OPENAI_API_KEY           = "openai"
GEMINI_API_KEY           = "google-ai"
OPENCLAW_ANTHROPIC_TOKEN = "anthropic-oauth"

[watchdog]
enabled  = true
patterns = [
  "FailoverError: No API key found for provider",
  "401 Unauthorized",
  "invalid x-api-key",
]
