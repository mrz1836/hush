name = "example-daemon"
reason = "Example long-running daemon"
server_url = "http://100.96.10.4:7743/h/a8k2f9"
client_machine_index = 2
session_type = "supervisor"
requested_ttl = "20h"
refresh_window = "09:00-10:00"
refresh_nudge_before = "30m"
boot_retry_timeout = "10m"
cache_secrets_for_restart = false
status_socket = "/tmp/hush/supervise-example-daemon.sock"
pid_file = "/tmp/hush/supervise-example-daemon.pid"
log_level = "info"
scope = ["ANTHROPIC_API_KEY", "OPENAI_API_KEY", "GITHUB_TOKEN"]

[child]
command = ["/usr/local/bin/daemon", "start"]
working_dir = "/tmp"
env_passthrough = ["PATH", "HOME"]
restart_on_clean_exit = true
restart_on_exit_78 = false

[discord]
daemon_label = "Example"
alert_channel_id = "234567890123456789"

[validators]
ANTHROPIC_API_KEY = "anthropic"
OPENAI_API_KEY = "openai"
GITHUB_TOKEN = "github"

[watchdog]
enabled = true
patterns = []
max_alerts_per_hour = 6
